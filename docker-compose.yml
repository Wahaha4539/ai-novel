name: ai-novel

services:
  deps:
    image: mcr.microsoft.com/devcontainers/javascript-node:1-20-bookworm
    user: root
    working_dir: /workspace
    command: >
      sh -lc "corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      pnpm install --frozen-lockfile"
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - shared_types_node_modules:/workspace/packages/shared-types/node_modules
      - prompt_templates_node_modules:/workspace/packages/prompt-templates/node_modules
      - pnpm_store:/pnpm/store

  postgres:
    image: ai-novel-postgres:local
    pull_policy: build
    build:
      context: .
      dockerfile_inline: |
        FROM postgres:17
        RUN apt-get update \
            && apt-get install -y --no-install-recommends postgresql-17-pgvector \
            && rm -rf /var/lib/apt/lists/*
    container_name: novel-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-ai_novel_mvp}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: novel-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: quay.io/minio/minio:RELEASE.2024-07-16T23-46-41Z
    container_name: novel-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20

  embedding:
    image: ai-novel-embedding:local
    pull_policy: never
    container_name: novel-embedding
    command:
      - --model-id
      - ${EMBEDDING_MODEL_PATH:-/models/bge-base-zh-v1.5}
      - --served-model-name
      - ${EMBEDDING_MODEL:-Xenova/bge-base-zh-v1.5}
    environment:
      HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}
      HF_HUB_OFFLINE: "1"
    ports:
      - "${EMBEDDING_PORT:-18319}:80"
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://127.0.0.1:80/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 120s

  api:
    image: mcr.microsoft.com/devcontainers/javascript-node:1-20-bookworm
    user: root
    container_name: novel-api
    working_dir: /workspace
    command: >
      sh -lc "corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      pnpm db:generate &&
      pnpm db:migrate &&
      pnpm --filter api start:dev"
    env_file:
      - path: .env
        required: false
    environment:
      API_PORT: ${API_PORT:-3001}
      DATABASE_NAME: ${DATABASE_NAME:-ai_novel_mvp}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${DATABASE_NAME:-ai_novel_mvp}
      POSTGRES_ADMIN_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://embedding/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-base-zh-v1.5}
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - shared_types_node_modules:/workspace/packages/shared-types/node_modules
      - prompt_templates_node_modules:/workspace/packages/prompt-templates/node_modules
      - pnpm_store:/pnpm/store
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding:
        condition: service_healthy

  web:
    image: mcr.microsoft.com/devcontainers/javascript-node:1-20-bookworm
    user: root
    container_name: novel-web
    working_dir: /workspace
    command: >
      sh -lc "corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      pnpm --dir apps/web exec next dev -p 3000 -H 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:${API_PORT:-3001}/api}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - shared_types_node_modules:/workspace/packages/shared-types/node_modules
      - prompt_templates_node_modules:/workspace/packages/prompt-templates/node_modules
      - web_next:/workspace/apps/web/.next
      - pnpm_store:/pnpm/store
    depends_on:
      deps:
        condition: service_completed_successfully
      api:
        condition: service_started

volumes:
  node_modules:
  api_node_modules:
  web_node_modules:
  shared_types_node_modules:
  prompt_templates_node_modules:
  pnpm_store:
  web_next:
  postgres_data:
  redis_data:
  minio_data:
